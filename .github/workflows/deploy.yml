name: Build and Deploy RAG API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# WHY TOP LEVEL PERMISSIONS:
# Grants OIDC token minting for the entire workflow
permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ragragistry
  AZURE_CONTAINER_APP: rag-api
  AZURE_RESOURCE_GROUP: rag-rag
  IMAGE_NAME: rag-api
  # WHY NODE 24 ENV VAR:
  # Fixes the deprecation warning without waiting for default switch
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # WHY REPEAT PERMISSIONS AT JOB LEVEL:
    # GitHub requires explicit permissions at job level for OIDC
    # Top level alone is not always inherited correctly
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Azure Login
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push to ACR
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container Apps
        if: github.event_name == 'push'
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" \
              "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}" \
              "AZURE_EMBEDDING_DEPLOYMENT=${{ secrets.AZURE_EMBEDDING_DEPLOYMENT }}" \
              "AZURE_CHAT_DEPLOYMENT=${{ secrets.AZURE_CHAT_DEPLOYMENT }}" \
              "QDRANT_URL=${{ secrets.QDRANT_URL }}" \
              "QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }}" \
              "QDRANT_COLLECTION=${{ secrets.QDRANT_COLLECTION }}"

      - name: Health check
        if: github.event_name == 'push'
        run: |
          sleep 30
          APP_URL=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          # WHY THIS CHECK:
          # If APP_URL is empty, curl hits garbage URL and gives misleading error
          # This gives you a clear message about what actually failed
          if [ -z "$APP_URL" ]; then
            echo "❌ APP_URL is empty — ingress not enabled on Container App"
            exit 1
          fi

          echo "🌐 App URL: https://${APP_URL}"
          curl -f https://${APP_URL}/health || exit 1
          echo "✅ Deployed at https://${APP_URL}"