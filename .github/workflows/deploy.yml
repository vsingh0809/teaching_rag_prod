name: Build and Deploy RAG API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ragragistry
  AZURE_CONTAINER_APP: rag-api
  AZURE_RESOURCE_GROUP: rag-rag
  IMAGE_NAME: rag-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Azure Login
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # WHY BUILDX:
      # Enables layer caching via GitHub Actions cache
      # Cuts build time from 4 mins → 1 min on repeat pushes
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          # WHY context points to backend folder:
          # Monorepo structure — backend and frontend in separate folders
          # Docker only needs backend code to build API image
          context: ./samasocial_backend
          file: ./samasocial_backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          # WHY CACHE:
          # Free tier GitHub Actions = 2000 mins/month
          # Caching saves ~3 mins per push = significant on free tier
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure Container Apps
        if: github.event_name == 'push'
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" \
              "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}" \
              "AZURE_EMBEDDING_DEPLOYMENT=${{ secrets.AZURE_EMBEDDING_DEPLOYMENT }}" \
              "AZURE_CHAT_DEPLOYMENT=${{ secrets.AZURE_CHAT_DEPLOYMENT }}" \
              "QDRANT_URL=${{ secrets.QDRANT_URL }}" \
              "QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }}" \
              "QDRANT_COLLECTION=${{ secrets.QDRANT_COLLECTION }}"

      # WHY RETRY LOOP NOT SINGLE CURL:
      # Azure Container Apps free tier South India = 3-5 min cold start
      # Single curl with sleep 30 fails consistently
      # 6 retries × 30s = 3 mins max wait — covers worst case
      - name: Health check
        if: github.event_name == 'push'
        run: |
          echo "Waiting for container cold start (South India free tier)..."
          sleep 120

          APP_URL=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          if [ -z "$APP_URL" ]; then
            echo "❌ APP_URL empty — ingress not enabled"
            exit 1
          fi

          echo "🌐 App URL: https://${APP_URL}"

          for i in 1 2 3 4 5 6; do
            echo "Health check attempt $i/6..."
            if curl -sf https://${APP_URL}/health; then
              echo "✅ Deployed at https://${APP_URL}"
              exit 0
            fi
            sleep 30
          done

          echo "❌ Health check failed after 6 attempts"
          exit 1